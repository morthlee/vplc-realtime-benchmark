version: "3.9"
services:
  docker_realtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vecat
    privileged: true
    tty: true
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    devices:
      - /dev/uio0
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: -1
    network_mode: host
    volumes:
      - /dev/hugepages:/dev/hugepages
